<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치지직 구독자 증명서</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; margin: 0; padding: 0; background: #0d0d0d; color: #fff; line-height: 1.5; min-height: 100vh; }
    .screen { max-width: 420px; margin: 0 auto; padding: 20px 16px 32px; min-height: 100vh; perspective: 1000px; }
    .flip-inner { position: relative; width: 100%; min-height: 100vh; transition: transform 0.6s; transform-style: preserve-3d; }
    .screen.flipped .flip-inner { transform: rotateY(180deg); }
    .flip-face { position: absolute; width: 100%; top: 0; left: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; min-height: 100vh; display: flex; flex-direction: column; padding: 20px 16px 32px; }
    .flip-face.back { transform: rotateY(180deg); }
    .flip-face.back .back-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px 16px; margin-top: 24px; flex: 1; }
    .flip-face .rotate-wrap { margin-top: auto; padding: 24px 0 0; display: flex; justify-content: center; }
    .flip-face.back .back-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; margin: 0 0 8px 0; }
    .flip-face.back .back-desc { font-size: 0.8125rem; color: #a0a0a0; margin: 0 0 20px 0; }
    .flip-face.back .back-label { font-size: 0.75rem; color: #808080; margin: 16px 0 6px 0; }
    .flip-face.back .back-link { font-size: 0.8125rem; color: #7dd3b8; word-break: break-all; margin: 0; }
    .flip-face.back .back-link a { color: #7dd3b8; text-decoration: none; }
    .flip-face.back .back-link a:hover { text-decoration: underline; }
    .flip-face.back .back-blah { font-size: 0.8125rem; color: #888; margin: 20px 0 0 0; }
    .header { text-align: center; padding: 16px 0 24px; }
    .header-title { font-size: 1.125rem; font-weight: 600; margin: 0; color: #fff; }
    .cert-card { background: #1a1a1a; border-radius: 16px; overflow: hidden; margin-bottom: 16px; border: 1px solid #2a2a2a; }
    .cert-card-image { position: relative; height: 320px; display: flex; align-items: flex-start; justify-content: center; padding: 10px 4px 10px 10px; }
    .cert-card-image.placeholder { background: linear-gradient(145deg, #252525 0%, #1a1a1a 100%); }
    .cert-card-image-center { width: 176px; height: 264px; margin-top: 44px; border-radius: 0; overflow: hidden; background: #333; flex-shrink: 0; position: relative; z-index: 0; }
    .cert-card-image-center img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .badge-left { position: absolute; top: 12px; left: 12px; z-index: 1; background: rgba(255,255,255,0.12); border-radius: 8px; padding: 6px 10px; display: flex; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.02em; color: #e0e0e0; }
    .badge-left .n-logo { width: 20px; height: 20px; background: #fff; color: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.75rem; }
    .badge-left .line2 { font-size: 0.55rem; opacity: 0.9; }
    .badge-left.nonproduct { color: #7dd3b8; }
    .badge-left.nonproduct .n-logo { background: #2d5a4a; color: #7dd3b8; }
    .badge-right { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4); border-radius: 8px; padding: 6px 10px; }
    .badge-right .service-name { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; }
    .badge-right .link-icon { width: 18px; height: 18px; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
    .cert-card-body { padding: 16px; }
    .cert-card-brand { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; margin: 0 0 6px 0; }
    .cert-card-desc { font-size: 0.8125rem; color: #a0a0a0; margin: 0; line-height: 1.45; }
    .btn-rotate { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8125rem; color: #a0a0a0; cursor: pointer; background: none; border: none; }
    .btn-rotate:hover { color: #fff; }
    .detail-section { padding: 0 4px; text-align: center; }
    .detail-title { font-size: 0.9375rem; font-weight: 600; color: #fff; margin: 0 0 12px 0; padding-bottom: 10px; border-bottom: 1px solid #2a2a2a; text-align: center; }
    .detail-row { display: flex; flex-direction: column; align-items: center; padding: 10px 0; font-size: 0.875rem; color: #a0a0a0; }
    .detail-row .label { color: #808080; margin-bottom: 4px; }
    .detail-row .value { color: #c0c0c0; }
    .bottom-buttons { display: flex; gap: 12px; margin-top: 24px; }
    .bottom-buttons .btn { flex: 1; padding: 14px 16px; border-radius: 12px; font-size: 0.9375rem; font-weight: 500; text-align: center; border: 1px solid #3a3a3a; background: #1a1a1a; color: #fff; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <section class="screen" id="flipWrapper">
    <div class="flip-inner">
      <div class="flip-face front">
        <header class="header">
          <h1 class="header-title">CHZZK SILVER BUTTON</h1>
        </header>
        <div class="cert-card">
          <div class="cert-card-image placeholder">
            <div class="badge-left nonproduct">
              <span class="n-logo">N</span>
              <span>
                <span class="line1">CHZZK GUARANTEED</span><br>
                <span class="line2">실버 버튼 · 치지직</span>
              </span>
            </div>
            <div class="badge-right">
              <span class="service-name">SHARE</span>
              <span class="link-icon">↗</span>
            </div>
            <div class="cert-card-image-center"><img src="chzzk-silver.png" alt="치지직 실버 버튼"></div>
          </div>
          <div class="cert-card-body">
            <p class="cert-card-brand">CHZZK</p>
            <p class="cert-card-desc">치지직 구독자 10만 달성 인증</p>
          </div>
        </div>
        <div class="detail-section">
          <h2 class="detail-title">상세 증명 내역</h2>
          <div class="detail-row"><span class="label">증명 상세</span><span class="value">구독자 10만 달성</span></div>
          <div class="detail-row"><span class="label">채널명</span><span class="value">이정섭 치지직 채널</span></div>
          <div class="detail-row"><span class="label">10만 달성일</span><span class="value">2026년 04월 05일</span></div>
        </div>
        <div class="bottom-buttons">
          <button type="button" class="btn">치지직 채널</button>
          <button type="button" class="btn">증명서 유의 사항</button>
        </div>
        <div class="rotate-wrap">
          <button type="button" class="btn-rotate" id="btnRotate" aria-label="뒷면 보기">↺ 180°</button>
        </div>
      </div>
      <div class="flip-face back">
        <header class="header">
          <h1 class="header-title">CHZZK SILVER BUTTON</h1>
        </header>
        <div class="back-box">
          <p class="back-title">CHZZK</p>
          <p class="back-desc">치지직 구독자 10만 달성 인증</p>
          <p class="back-label">치지직 채널 주소</p>
          <p class="back-link"><a href="https://chzzk.naver.com/xxxxx" target="_blank" rel="noopener">https://chzzk.naver.com/xxxxx</a></p>
          <p class="back-label">공식 카페</p>
          <p class="back-link"><a href="https://cafe.naver.com/theminos" target="_blank" rel="noopener">https://cafe.naver.com/theminos</a></p>
          <p class="back-blah">BlahBlah~</p>
        </div>
        <div class="rotate-wrap">
          <button type="button" class="btn-rotate" id="btnRotateBack" aria-label="앞면 보기">↺ 180°</button>
        </div>
      </div>
    </div>
  </section>
  <script>
    (function() {
      var wrapper = document.getElementById('flipWrapper');
      var btnFront = document.getElementById('btnRotate');
      var btnBack = document.getElementById('btnRotateBack');
      function flip() { wrapper.classList.toggle('flipped'); }
      if (btnFront) btnFront.addEventListener('click', flip);
      if (btnBack) btnBack.addEventListener('click', flip);
    })();
  </script>
</body>
</html>
